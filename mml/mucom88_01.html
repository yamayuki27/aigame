<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>MUCOM88 Visual Engine v16.0</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #050505;
            color: #eee;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #00ff41;
            padding: 20px;
            box-shadow: 0 0 20px #004411;
        }

        .status-bar {
            background: #111;
            padding: 10px;
            border: 1px solid #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            color: #0f4;
        }

        .mixer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 5px;
            margin-bottom: 15px;
        }

        .channel {
            background: #111;
            border: 1px solid #222;
            padding: 5px;
            text-align: center;
            font-size: 10px;
        }

        .mute-btn {
            width: 100%;
            margin-top: 5px;
            cursor: pointer;
            background: #003300;
            color: #0f4;
            border: 1px solid #0f4;
            font-size: 10px;
        }

        .mute-btn.muted {
            background: #330000;
            color: #f00;
            border-color: #f00;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            color: #0f4;
            border: 1px solid #0f4;
            padding: 10px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        /* 文字の色分け */
        #visualDisplay {
            width: 100%;
            height: 350px;
            background: #000;
            color: #fff;
            /* デフォルトは白 */
            border: 1px solid #222;
            padding: 10px;
            overflow-y: scroll;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 11px;
            line-height: 1.6;
        }

        .note-span {
            color: #fff;
        }

        /* 解析済み：白 */
        .hl-unsupported {
            color: #ffff00 !important;
            font-weight: bold;
        }

        /* 非対応：黄 */
        .hl-active {
            color: #fff !important;
            background: #008800 !important;
            font-weight: bold;
            box-shadow: 0 0 5px #0f4;
        }

        /* 演奏中 */
        .hl-played {
            color: #00ff41;
            background: rgba(0, 255, 65, 0.08);
        }

        /* 演奏済 */

        #debugLog {
            width: 100%;
            height: 120px;
            background: #000;
            color: #ffae00;
            border: 1px solid #333;
            overflow-y: scroll;
            padding: 10px;
            font-size: 11px;
            margin-top: 10px;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        button#playBtn {
            background: #0f4;
            color: #000;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>MUCOM88 PSG ENGINE v16.0</h1>
        <div class="status-bar">
            <div id="measureDisplay">MEASURE: -- / --</div>
            <div id="tempoDisplay">TEMPO: ---</div>
        </div>
        <div class="mixer" id="mixerBoard"></div>
        <textarea id="mmlInput" placeholder="MMLをロードしてください"></textarea>
        <div id="visualDisplay"></div>
        <div id="debugLog">--- System Log ---<br></div>
        <div class="controls"><input type="file" id="fileInput" accept=".muc,.txt"><button id="playBtn">STOP &
                PLAY</button></div>
    </div>

    <script>
        let audioCtx, noiseBuffer, currentMMLString = "";
        let channelStates = {}, channelGains = {}, charEvents = {}, unsupportedIndices = new Set();
        let startTime = 0, currentTempo = 120, isPlaying = false;

        const notesMap = { 'c': 0, 'c+': 1, 'c#': 1, 'd-': 1, 'd': 2, 'd+': 3, 'd#': 3, 'e-': 3, 'e': 4, 'f': 5, 'f+': 6, 'f#': 6, 'g-': 6, 'g': 7, 'g+': 8, 'g#': 8, 'a-': 8, 'a': 9, 'a+': 10, 'a#': 10, 'b-': 10, 'b': 11 };
        const channelLabels = { 'A': 'FM1', 'B': 'FM2', 'C': 'FM3', 'D': 'SSG1', 'E': 'SSG2', 'F': 'SSG3', 'G': 'RHYTHM', 'H': 'FM4', 'I': 'FM5', 'J': 'FM6', 'K': 'PCM' };

        function log(msg, err = false) {
            const d = document.getElementById('debugLog');
            d.innerHTML += `<span style="color:${err ? '#ff4444' : '#ffae00'}">${msg}</span><br>`;
            d.scrollTop = d.scrollHeight;
        }

        // ミキサーUI
        const mixerBoard = document.getElementById('mixerBoard');
        Object.keys(channelLabels).forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel';
            div.innerHTML = `${channelLabels[ch]}<br><b>${ch}</b><button class="mute-btn" id="mute-${ch}" onclick="toggleMute('${ch}')">ON</button>`;
            mixerBoard.appendChild(div);
        });

        function toggleMute(ch) {
            const btn = document.getElementById(`mute-${ch}`);
            const m = btn.classList.toggle('muted');
            btn.textContent = m ? 'OFF' : 'ON';
            if (channelGains[ch]) channelGains[ch].gain.setTargetAtTime(m ? 0 : 1, audioCtx ? audioCtx.currentTime : 0, 0.01);
        }

        async function initAudio() {
            if (audioCtx) await audioCtx.close();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            Object.keys(channelLabels).forEach(ch => {
                const g = audioCtx.createGain();
                g.gain.value = document.getElementById(`mute-${ch}`).classList.contains('muted') ? 0 : 1;
                g.connect(audioCtx.destination);
                channelGains[ch] = g;
            });
            noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
            const d = noiseBuffer.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        }

        async function parseAndPlay() {
            currentMMLString = document.getElementById('mmlInput').value;
            if (!currentMMLString) return;
            await initAudio();
            isPlaying = true; charEvents = {}; unsupportedIndices.clear();
            startTime = audioCtx.currentTime + 0.3;

            const displayArea = document.getElementById('visualDisplay');
            displayArea.innerHTML = ""; let frag = document.createDocumentFragment();
            for (let i = 0; i < currentMMLString.length; i++) {
                let s = document.createElement('span'); s.id = `char-${i}`; s.className = 'note-span'; s.textContent = currentMMLString[i];
                frag.appendChild(s); charEvents[i] = [];
            }
            displayArea.appendChild(frag);

            Object.keys(channelLabels).forEach(ch => channelStates[ch] = { ticks: 0, octave: 4, v: 10, l: 4, q: 8, clock: 96, loopStack: [] });

            const lines = currentMMLString.split('\n');
            let offset = 0;

            lines.forEach((line, lineIdx) => {
                const commentIdx = line.indexOf(';');
                const mmlSource = (commentIdx !== -1) ? line.substring(0, commentIdx) : line;
                const m = mmlSource.match(/^([A-K])\s+(.*)/i);

                if (m) {
                    const chId = m[1].toUpperCase(), content = m[2];
                    const state = channelStates[chId];
                    const contentStartIdx = line.indexOf(m[2]);

                    const tokens = [];
                    // 既知のコマンドリスト。L（ループポイント）と l（長さ）を分ける
                    const regex = /([a-g][+\-#]?|[rvot<>\[\]&/()kqd@mpeyCclL!]|\d+\.?\d*)|(\S)/g;
                    let tMatch;
                    while ((tMatch = regex.exec(content)) !== null) {
                        const val = tMatch[1] || tMatch[0], globalIdx = offset + contentStartIdx + tMatch.index;
                        const known = !!tMatch[1] && !["m", "p", "e", "y", "@", "k", "d"].includes(val.toLowerCase());
                        tokens.push({ val, idx: globalIdx, len: val.length, known: known });
                        if (!known && !"{ } ,".includes(val)) { unsupportedIndices.add(globalIdx); }
                    }

                    for (let i = 0; i < tokens.length; i++) {
                        let t = tokens[i];

                        if (notesMap[t.val.toLowerCase()] !== undefined || t.val.toLowerCase() === 'r') {
                            let eventIndices = [];
                            const getNoteInfo = (idx) => {
                                let cur = tokens[idx]; eventIndices.push({ start: cur.idx, len: cur.len });
                                let len = state.l;
                                if (idx + 1 < tokens.length && /^\d+\.?/.test(tokens[idx + 1].val)) {
                                    let n = tokens[++idx]; len = parseFloat(n.val);
                                    eventIndices.push({ start: n.idx, len: n.len });
                                    if (n.val.includes('.')) len /= 1.5;
                                }
                                return { ticks: (state.clock * 4) / len, nextIdx: idx };
                            };
                            let nInfo = getNoteInfo(i); let totalTicks = nInfo.ticks; i = nInfo.nextIdx;
                            while (i + 1 < tokens.length && tokens[i + 1].val === '&') {
                                eventIndices.push({ start: tokens[++i].idx, len: tokens[i].len });
                                if (i + 1 < tokens.length) { let nxt = getNoteInfo(++i); totalTicks += nxt.ticks; i = nxt.nextIdx; }
                            }
                            const time = startTime + (state.ticks * (60 / (currentTempo * state.clock)));
                            const durFull = totalTicks * (60 / (currentTempo * state.clock));
                            if (t.val.toLowerCase() !== 'r') {
                                const freq = 440 * Math.pow(2, (notesMap[t.val.toLowerCase()] + (state.octave - 4) * 12) / 12);
                                if (chId === 'G') playDrum(t.val[0].toLowerCase(), time, state.v);
                                else playPSG(freq, time, durFull * (state.q / 8), state.v, chId);
                            }
                            eventIndices.forEach(range => { for (let k = 0; k < range.len; k++) if (charEvents[range.start + k]) charEvents[range.start + k].push({ time, end: time + durFull }); });
                            state.ticks += totalTicks;
                        }
                        else if (t.val.toLowerCase() === 't') { let v = parseInt(tokens[++i]?.val); if (v) currentTempo = v; }
                        else if (t.val === 'C') { let v = parseInt(tokens[++i]?.val); if (v) state.clock = v; } // クロック反映
                        else if (t.val.toLowerCase() === 'o') { let v = parseInt(tokens[++i]?.val); if (v) state.octave = v; }
                        else if (t.val === '<') state.octave--; else if (t.val === '>') state.octave++;
                        else if (t.val === '(') state.v--; else if (t.val === ')') state.v++;
                        else if (t.val === 'l') { let v = parseInt(tokens[++i]?.val); if (v) state.l = v; }
                        else if (t.val === 'L') { /* ループポイント：スキップ */ }
                        else if (["v", "q", "k", "d", "p", "@", "m", "e", "y"].includes(t.val.toLowerCase())) {
                            // パラメータを黄色（非対応）として扱い、直後の数値列をスキップ
                            if (t.val.toLowerCase() === 'v' && !isNaN(parseInt(tokens[i + 1]?.val)) && chId !== 'G') {
                                state.v = parseInt(tokens[++i].val);
                            } else {
                                while (i + 1 < tokens.length && (/^\d+/.test(tokens[i + 1].val) || tokens[i + 1].val === ',')) {
                                    unsupportedIndices.add(tokens[++i].idx);
                                }
                            }
                        }
                        else if (t.val === '[') {
                            let depth = 0, endIdx = -1;
                            for (let j = i + 1; j < tokens.length; j++) {
                                if (tokens[j].val === '[') depth++; else if (tokens[j].val === ']') { if (depth === 0) { endIdx = j; break; } depth--; }
                            }
                            let max = parseInt(tokens[endIdx + 1]?.val) || 2;
                            state.loopStack.push({ startIdx: i, endIdx, count: 0, max });
                        }
                        else if (t.val === '/') {
                            let l = state.loopStack[state.loopStack.length - 1];
                            if (l && l.count === l.max - 1) i = l.endIdx - 1;
                        }
                        else if (t.val === ']') {
                            let l = state.loopStack[state.loopStack.length - 1];
                            if (l) { l.count++; if (l.count < l.max) i = l.startIdx; else { state.loopStack.pop(); if (!isNaN(parseInt(tokens[i + 1]?.val))) i++; } }
                        }
                    }
                }
                offset += line.length + 1;
            });

            // 非対応コマンド（黄色）の反映
            unsupportedIndices.forEach(idx => document.getElementById(`char-${idx}`)?.classList.add('hl-unsupported'));
            log(`Parsing complete. Clock: ${channelStates['A'].clock} / Tempo: ${currentTempo}`);
            document.getElementById('tempoDisplay').textContent = `TEMPO: ${currentTempo}`;
            requestAnimationFrame(draw);
        }

        function playPSG(f, t, d, v, ch) {
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(f, t);
            g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(v * 0.012, t + 0.005); g.gain.linearRampToValueAtTime(0, t + d);
            osc.connect(g).connect(channelGains[ch]); osc.start(t); osc.stop(t + d);
        }

        function playDrum(c, t, v) {
            const g = audioCtx.createGain(); g.connect(channelGains['G']); const vol = v * 0.05;
            if (c === 'c') {
                const o = audioCtx.createOscillator(); o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.08);
                g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                o.connect(g); o.start(t); o.stop(t + 0.08);
            } else if (c === 'd' || c === 'f') {
                const s = audioCtx.createBufferSource(); s.buffer = noiseBuffer;
                const f = audioCtx.createBiquadFilter(); f.type = (c === 'd' ? 'bandpass' : 'highpass'); f.frequency.value = (c === 'd' ? 1200 : 9000);
                g.gain.setValueAtTime(c === 'd' ? vol : vol * 0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                s.connect(f).connect(g); s.start(t); s.stop(t + 0.1);
            }
        }

        function draw() {
            if (!isPlaying) return; const now = audioCtx.currentTime;
            for (let i = 0; i < currentMMLString.length; i++) {
                const evs = charEvents[i]; const el = document.getElementById(`char-${i}`); if (!el || !evs.length) continue;
                let s = 'idle';
                for (let e of evs) { if (now >= e.time && now <= e.end) { s = 'active'; break; } else if (now > e.end) s = 'played'; else if (now < e.time && s === 'played') s = 'idle'; }
                if (s === 'active') { el.classList.add('hl-active'); el.classList.remove('hl-played'); }
                else if (s === 'played') { el.classList.add('hl-played'); el.classList.remove('hl-active'); }
                else { el.classList.remove('hl-active', 'hl-played'); }
            }
            const ticks = (now - startTime) / (60 / (currentTempo * channelStates['A'].clock));
            if (ticks > 0) document.getElementById('measureDisplay').textContent = `MEASURE: ${Math.floor(ticks / 384) + 1}`;
            requestAnimationFrame(draw);
        }

        document.getElementById('playBtn').onclick = () => parseAndPlay();
        document.getElementById('fileInput').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => { document.getElementById('mmlInput').value = ev.target.result; log("MML Loaded."); };
            r.readAsText(e.target.files[0]);
        };
    </script>
</body>

</html>
