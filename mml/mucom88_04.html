<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>MUCOM88 Visual Engine v38.0</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #050505;
            color: #eee;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #00ff41;
            padding: 20px;
            box-shadow: 0 0 20px #004411;
        }

        .status-bar {
            background: #111;
            padding: 10px;
            border: 1px solid #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            color: #0f4;
        }

        .mixer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 5px;
            margin-bottom: 15px;
        }

        .channel {
            background: #111;
            border: 1px solid #222;
            padding: 5px;
            text-align: center;
            font-size: 10px;
        }

        .mute-btn {
            width: 100%;
            margin-top: 5px;
            cursor: pointer;
            background: #003300;
            color: #0f4;
            border: 1px solid #0f4;
            font-size: 10px;
        }

        .mute-btn.muted {
            background: #330000;
            color: #f00;
            border-color: #f00;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            color: #0f4;
            border: 1px solid #0f4;
            padding: 10px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        #visualDisplay {
            width: 100%;
            height: 400px;
            background: #000;
            border: 1px solid #222;
            padding: 10px;
            overflow-y: scroll;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 11px;
            line-height: 1.6;
        }

        /* 視覚的ルール */
        .note-span {
            color: #ffffff;
        }

        .hl-warning {
            color: #ffff00 !important;
            font-weight: bold;
        }

        /* 黄: 未知/定義/コメント */
        .hl-red {
            color: #ff3333 !important;
            font-weight: bold;
            text-decoration: underline;
        }

        /* 赤: 非対応/エラー */
        .hl-played {
            color: #555555 !important;
            background: rgba(255, 255, 255, 0.03);
        }

        /* 灰: 演奏済 */
        .hl-active {
            color: #ffffff !important;
            background: #008800 !important;
            font-weight: bold;
            box-shadow: 0 0 8px #0f4;
        }

        /* 緑: 演奏中 */

        #debugLog {
            width: 100%;
            height: 100px;
            background: #000;
            color: #ffae00;
            border: 1px solid #333;
            overflow-y: scroll;
            padding: 10px;
            font-size: 11px;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            background: #0f4;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }

        #delayToggle {
            background: #444;
            color: #fff;
        }

        #delayToggle.active {
            background: #ffae00;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>MUCOM88 PSG ENGINE v38.0</h1>
        <div class="status-bar">
            <div id="measureDisplay">MEASURE: -- / --</div>
            <div id="tempoDisplay">TEMPO: --- (0.75x Speed)</div>
        </div>
        <div class="mixer" id="mixerBoard"></div>
        <textarea id="mmlInput" placeholder="MMLを貼り付けてください"></textarea>
        <div id="visualDisplay"></div>
        <div id="debugLog">--- System Log ---<br></div>
        <div class="controls">
            <input type="file" id="fileInput" accept=".muc,.txt">
            <button id="delayToggle" onclick="toggleDelay()">IGNORE DELAY/ECHO: OFF</button>
            <button id="playBtn" style="flex-grow:1">STOP & PLAY (25% SLOW)</button>
        </div>
    </div>
    <script>
        let audioCtx, noiseBuffer, currentMMLString = "";
        let channelStates = {}, channelGains = {}, charEvents = {}, redIndices = new Set(), yellowIndices = new Set(), macros = {};
        let startTime = 0, currentTempo = 120, isPlaying = false, animationId, ignoreDelay = false;

        const notesMap = { 'c': 0, 'c+': 1, 'c#': 1, 'd-': 1, 'd': 2, 'd+': 3, 'd#': 3, 'e-': 3, 'e': 4, 'f': 5, 'f+': 6, 'f#': 6, 'g-': 6, 'g': 7, 'g+': 8, 'g#': 8, 'a-': 8, 'a': 9, 'a+': 10, 'a#': 10, 'b-': 10, 'b': 11 };
        const channelLabels = { 'A': 'FM1', 'B': 'FM2', 'C': 'FM3', 'D': 'SSG1', 'E': 'SSG2', 'F': 'SSG3', 'G': 'RHYTHM', 'H': 'FM4', 'I': 'FM5', 'J': 'FM6', 'K': 'PCM' };
        const supportedCmds = new Set(['T', 't', 'o', 'v', 'l', 'L', 'q', 'C', '[', ']', '/', '&', '^', '(', ')', '<', '>', 'r', '*', 'D', 'K', 'k', '.', ':', ';']);

        function toggleDelay() {
            ignoreDelay = !ignoreDelay;
            const btn = document.getElementById('delayToggle'); btn.className = ignoreDelay ? 'active' : '';
            btn.textContent = `IGNORE DELAY/ECHO: ${ignoreDelay ? 'ON' : 'OFF'}`;
        }

        function log(msg, err = false) {
            const d = document.getElementById('debugLog');
            d.innerHTML += `<span style="color:${err ? '#f44' : '#fa0'}">${msg}</span><br>`;
            d.scrollTop = d.scrollHeight;
        }

        const mixerBoard = document.getElementById('mixerBoard');
        Object.keys(channelLabels).forEach(ch => {
            const div = document.createElement('div'); div.className = 'channel';
            div.innerHTML = `${channelLabels[ch]}<br><b>${ch}</b><button class="mute-btn" id="mute-${ch}" onclick="toggleMute('${ch}')">ON</button>`;
            mixerBoard.appendChild(div);
        });

        function toggleMute(ch) {
            const btn = document.getElementById(`mute-${ch}`); const m = btn.classList.toggle('muted');
            btn.textContent = m ? 'OFF' : 'ON';
            if (channelGains[ch]) channelGains[ch].gain.setTargetAtTime(m ? 0 : 1, audioCtx ? audioCtx.currentTime : 0, 0.01);
        }

        async function initAudio() {
            if (audioCtx) try { await audioCtx.close(); } catch (e) { }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            Object.keys(channelLabels).forEach(ch => {
                const g = audioCtx.createGain(); g.gain.value = document.getElementById(`mute-${ch}`).classList.contains('muted') ? 0 : 1;
                g.connect(audioCtx.destination); channelGains[ch] = g;
            });
            noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
            const d = noiseBuffer.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        }

        function extractMacros(text) {
            macros = {};
            const regex = /#\s*\*(\d+)\s*\{([^}]*)\}/g;
            let m; while ((m = regex.exec(text)) !== null) macros[m[1]] = m[2];
        }

        async function parseAndPlay() {
            if (animationId) cancelAnimationFrame(animationId);
            currentMMLString = document.getElementById('mmlInput').value.replace(/\\/g, '¥').replace(/\r\n/g, '\n');
            if (!currentMMLString) return;
            extractMacros(currentMMLString); await initAudio();
            isPlaying = true; charEvents = {}; redIndices.clear(); yellowIndices.clear();
            startTime = audioCtx.currentTime + 0.5;

            const displayArea = document.getElementById('visualDisplay'); displayArea.innerHTML = "";
            let frag = document.createDocumentFragment();
            for (let i = 0; i < currentMMLString.length; i++) {
                let s = document.createElement('span'); s.id = `char-${i}`; s.className = 'note-span'; s.textContent = currentMMLString[i];
                frag.appendChild(s); charEvents[i] = [];
            }
            displayArea.appendChild(frag);

            Object.keys(channelLabels).forEach(ch => channelStates[ch] = { ticks: 0.0, octave: 4, v: 10, l: 4, q: 8, clock: 128, detune: 0, kshift: 0, loopStack: [] });

            const lines = currentMMLString.split('\n');
            let offset = 0;

            lines.forEach((line) => {
                const mmlSource = line.split(';')[0].split(':')[0]; // ; と : で切断 [new]
                if (line.includes(';')) {
                    let start = offset + line.indexOf(';');
                    for (let k = start; k < offset + line.length; k++) yellowIndices.add(k);
                }
                const m = mmlSource.match(/^([A-K])\s+(.*)/i);
                if (m) {
                    const chId = m[1].toUpperCase(), content = m[2], state = channelStates[chId], contentStartIdx = line.indexOf(m[2]);
                    const tokenize = (str, startPos) => {
                        const tokens = [];
                        const regex = /("[^"]*"|[a-g][+\-#]?|[rvotT<>\[\]&/^()kqd@%mpeyCclL!S\$wW]|\d+|\.+|\$[0-9a-fA-F]+|\*|D|K|k|E|[:;])|(\S)/g;
                        let t; while ((t = regex.exec(str)) !== null) {
                            const val = t[1] || t[0], gi = startPos + t.index;
                            const isNote = /^[a-g][+\-#]?$/.test(val);
                            const isPotentialCmd = /^[a-zA-Z<>()[\]&/^@%S\$C\*D:;]$/.test(val) || val.startsWith('"');
                            tokens.push({ val, idx: gi, len: val.length, isNote, isPotentialCmd });
                            if (!t[1] && !"{ } ,".includes(val)) yellowIndices.add(gi);
                        }
                        return tokens;
                    };

                    const process = (tkns) => {
                        for (let i = 0; i < tkns.length; i++) {
                            let t = tkns[i]; const lowVal = t.val.toLowerCase();
                            if (t.val === '*') {
                                let mId = ""; while (i + 1 < tkns.length && /^\d+$/.test(tkns[i + 1].val)) mId += tkns[++i].val;
                                if (macros[mId]) process(tokenize(macros[mId], t.idx)); continue;
                            }
                            if (t.isNote || lowVal === 'r') {
                                let evIndices = [];
                                const getNoteTicks = (idx) => {
                                    let cur = tkns[idx]; evIndices.push({ start: cur.idx, len: cur.len });
                                    let baseLen = state.l;
                                    if (idx + 1 < tkns.length && /^\d/.test(tkns[idx + 1].val)) {
                                        let n = tkns[++idx]; baseLen = parseFloat(n.val) || state.l; evIndices.push({ start: n.idx, len: n.len });
                                    }
                                    let dots = 0; while (idx + 1 < tkns.length && tkns[idx + 1].val[0] === '.') { let dt = tkns[++idx]; dots += dt.len; evIndices.push({ start: dt.idx, len: dt.len }); }
                                    let bt = state.clock / baseLen; let total = bt; for (let d = 1; d <= dots; d++) total += bt / Math.pow(2, d);
                                    return { ticks: total, nextIdx: idx };
                                };
                                let nInfo = getNoteTicks(i); let totalTicks = nInfo.ticks; i = nInfo.nextIdx;
                                while (i + 1 < tkns.length && (tkns[i + 1].val === '&' || tkns[i + 1].val === '^')) {
                                    let sym = tkns[++i]; evIndices.push({ start: sym.idx, len: sym.len });
                                    if (i + 1 < tkns.length && (tkns[i + 1].isNote || tkns[i + 1].val.toLowerCase() === 'r' || /^\d/.test(tkns[i + 1].val))) {
                                        let nx = getNoteTicks(++i); totalTicks += nx.ticks; i = nx.nextIdx;
                                    } else break;
                                }
                                const time = startTime + (state.ticks * (60 / (currentTempo * 0.75 * (state.clock / 4))));
                                const durFull = totalTicks * (60 / (currentTempo * 0.75 * (state.clock / 4)));
                                if (lowVal !== 'r') {
                                    const freq = 440 * Math.pow(2, (notesMap[lowVal] + (state.octave - 4) * 12 + state.kshift) / 12) + (state.detune * 0.1);
                                    if (chId === 'G') playDrum(lowVal[0], time, state.v);
                                    else playPSG(freq, time, durFull * (state.q / 8), state.v, chId);
                                }
                                evIndices.forEach(r => { for (let k = 0; k < r.len; k++) if (charEvents[r.start + k]) charEvents[r.start + k].push({ time, end: time + durFull }); });
                                state.ticks += totalTicks; // 浮動小数点加算で同期維持
                            }
                            else if (t.val === 'D' || t.val === 'K' || t.val === 'k') {
                                i++; let isRel = (tkns[i]?.val === '+'); if (isRel) i++;
                                let valStr = ""; if (tkns[i]?.val === '-' || tkns[i]?.val === '+') valStr += tkns[i++].val; if (/^\d+$/.test(tkns[i]?.val)) valStr += tkns[i++].val;
                                let val = parseInt(valStr) || 0;
                                if (t.val === 'D') { if (isRel || valStr.startsWith('+')) state.detune += val; else state.detune = val; }
                                else if (t.val === 'K') state.kshift = val;
                                else if (t.val === 'k') state.kshift += val;
                                i--;
                            }
                            else if (t.val === 'C') { i++; let v = parseInt(tkns[i]?.val); if (v) state.clock = v; }
                            else if (lowVal === 't' || t.val === 'T') { i++; let v = parseInt(tkns[i]?.val); if (v) currentTempo = v; }
                            else if (lowVal === 'o') { i++; let v = parseInt(tkns[i]?.val); if (!isNaN(v)) state.octave = v; }
                            else if (t.val === '<') state.octave--; else if (t.val === '>') state.octave++;
                            else if (t.val === '(' || t.val === ')') {
                                let dir = (t.val === '(') ? -1 : 1;
                                let step = 1; if (i + 1 < tkns.length && /^\d+$/.test(tkns[i + 1].val)) step = parseInt(tkns[++i].val);
                                state.v = Math.max(0, Math.min(127, state.v + (dir * step)));
                            }
                            else if (lowVal === 'l') { i++; let v = parseInt(tkns[i]?.val); if (v) state.l = v; }
                            else if (lowVal === 'q') { i++; let v = parseInt(tkns[i]?.val); if (v) state.q = v; }
                            else if (t.val === '[') {
                                let d = 0, ei = -1; for (let j = i + 1; j < tkns.length; j++) { if (tkns[j].val === '[') d++; else if (tkns[j].val === ']') { if (d === 0) { ei = j; break; } d--; } }
                                let max = (ei !== -1 && tkns[ei + 1] && /^\d+$/.test(tkns[ei + 1].val)) ? parseInt(tkns[ei + 1].val) : 2;
                                state.loopStack.push({ startIdx: i, endIdx: ei, count: 0, max });
                            }
                            else if (t.val === '/') { let l = state.loopStack[state.loopStack.length - 1]; if (l && l.count === l.max - 1) i = l.endIdx - 1; }
                            else if (t.val === ']') { let l = state.loopStack[state.loopStack.length - 1]; if (l) { l.count++; if (l.count < l.max) i = l.startIdx; else { state.loopStack.pop(); if (tkns[i + 1] && /^\d+$/.test(tkns[i + 1].val)) i++; } } }
                            else if (t.val === ':') { break; } // コンパイル停止 [new]
                            else {
                                // 赤色化: 接尾辞付きコマンド (MF, yTL, vm, w)
                                let start = t.idx;
                                let isSubM = t.val === 'M' && tkns[i + 1] && ['F', 'W', 'C', 'L', 'D'].includes(tkns[i + 1].val);
                                let isVM = t.val === 'v' && tkns[i + 1]?.val === 'm';
                                let isYSub = false;
                                if (t.val === 'y' && tkns[i + 1] && tkns[i + 2]) {
                                    let combo = tkns[i + 1].val + tkns[i + 2].val;
                                    if (['DM', 'TL', 'KA', 'DR', 'SR', 'SL', 'SE'].includes(combo)) isYSub = true;
                                }
                                if (isSubM || isVM) i++; else if (isYSub) i += 2;
                                let end = tkns[i].idx + tkns[i].len;
                                while (i + 1 < tkns.length) {
                                    let next = tkns[i + 1];
                                    if (next.isNote || (supportedCmds.has(next.val) && !/^[0-9,.\-\+\$]$/.test(next.val))) break;
                                    if (/^[0-9,.\-\+\$]$/.test(next.val[0]) || next.val.startsWith('"')) { i++; end = tkns[i].idx + tkns[i].len; } else break;
                                }
                                if (!supportedCmds.has(t.val) || isVM || isSubM || isYSub || t.val === 'E' || t.val === 'M' || t.val === 'w') {
                                    for (let k = start; k < end; k++) redIndices.add(k);
                                }
                            }
                        }
                    };
                    process(tokenize(content, offset + contentStartIdx));
                } else {
                    // 音色定義などを黄色で保護
                    for (let k = offset; k < offset + line.length; k++) yellowIndices.add(k);
                }
                offset += line.length + 1;
            });
            animationId = requestAnimationFrame(draw);
        }

        function playPSG(f, t, d, v, ch) {
            if (isNaN(f) || f <= 0) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.setValueAtTime(f, t);
            g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(Math.max(0, v) * 0.01, t + 0.005); g.gain.linearRampToValueAtTime(0, t + d);
            o.connect(g).connect(channelGains[ch]); o.start(t); o.stop(t + d);
        }

        function playDrum(c, t, v) {
            const g = audioCtx.createGain(); g.connect(channelGains['G']); const vol = Math.max(0, v) * 0.04;
            if (c === 'c') {
                const o = audioCtx.createOscillator(); o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.08);
                g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                o.connect(g); o.start(t); o.stop(t + 0.08);
            } else if (c === 'd' || c === 'f' || c === 'g') {
                const s = audioCtx.createBufferSource(); s.buffer = noiseBuffer;
                const f = audioCtx.createBiquadFilter(); f.type = (c === 'd' ? 'bandpass' : 'highpass'); f.frequency.value = (c === 'd' ? 1200 : 8000);
                g.gain.setValueAtTime(vol * (c === 'd' ? 1 : 0.5), t); g.gain.exponentialRampToValueAtTime(0.001, t + (c === 'g' ? 0.2 : 0.1));
                s.connect(f).connect(g); s.start(t); s.stop(t + (c === 'g' ? 0.2 : 0.1));
            }
        }

        function draw() {
            if (!isPlaying || !audioCtx) return; const now = audioCtx.currentTime;
            for (let i = 0; i < currentMMLString.length; i++) {
                const evs = charEvents[i]; const el = document.getElementById(`char-${i}`); if (!el) continue;
                let charState = 'idle';
                if (evs && evs.length) {
                    for (let e of evs) {
                        if (now >= e.time && now <= e.end) { charState = 'active'; break; }
                        else if (now > e.end) charState = 'played';
                        else if (now < e.time && charState === 'played') { charState = 'idle'; break; }
                    }
                }
                let targetClass = 'note-span';
                if (redIndices.has(i)) targetClass += ' hl-red';
                else if (yellowIndices.has(i)) targetClass += ' hl-warning';
                if (charState === 'active') targetClass += ' hl-active';
                else if (charState === 'played') targetClass += ' hl-played';
                if (el.className !== targetClass) el.className = targetClass;
            }
            animationId = requestAnimationFrame(draw);
        }

        document.getElementById('playBtn').onclick = () => parseAndPlay();
        document.getElementById('fileInput').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => { document.getElementById('mmlInput').value = ev.target.result; log("MML Loaded."); };
            r.readAsText(e.target.files[0]);
        };
    </script>
</body>

</html>
