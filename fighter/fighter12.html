<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>3D Planet Fighter - Wireframe Turret Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            touch-action: none;
            font-family: 'Courier New', Courier, monospace;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ff00;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        h1 {
            font-size: 48px;
            text-shadow: 2px 2px 0px #004400;
            margin-bottom: 10px;
        }

        p {
            margin: 5px;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover {
            background: #00ff00;
            color: #000;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-size: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            z-index: 5;
            display: none;
        }

        #timer-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 80px;
            font-weight: bold;
            pointer-events: none;
            z-index: 6;
            display: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="ui"></div>
    <div id="timer-warning"></div>

    <div id="screen-title" class="overlay">
        <h1>PLANET FIGHTER [TURRET-UPDATE]</h1>
        <p>CAUTION: ENEMY TURRETS DETECTED</p>
        <button onclick="changeState('PREP')">START MISSION</button>
    </div>

    <div id="screen-prep" class="overlay hidden">
        <h1>PREPARING...</h1>
        <p id="prep-status">SCANNING PLANETARY SURFACE</p>
        <button id="btn-go" class="hidden" onclick="changeState('GAME')">GO!</button>
    </div>

    <div id="screen-gameover" class="overlay hidden">
        <h1 id="gameover-title">MISSION FAILED</h1>
        <p id="gameover-score"></p>
        <button onclick="changeState('TITLE')">BACK TO BASE</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const GameState = { TITLE: 'TITLE', PREP: 'PREP', GAME: 'GAME', GAMEOVER: 'GAMEOVER' };
        let currentState = GameState.TITLE;

        const PLANET_RADIUS = 100;
        const SHIP_SIZE = 3.75;
        const ALTITUDE = 2;
        const BASE_RADIUS = 3;
        const BASE_HEIGHT = 5;
        const TURRET_RADIUS = BASE_RADIUS * 1.5; // 基地の1.5倍
        const MAX_POOL_BULLETS = 12;
        const MAX_ENEMY_BULLETS = 40;
        const TIME_LIMIT = 180;

        let maxSimultaneousBullets = 4;
        const FORWARD_SPEED = 0.001875;
        const MAX_TURN_SPEED = 0.024;
        const TURN_SPRING = 0.25;
        const TURN_DAMPING = 0.85;
        const BULLET_SPEED = 0.012;

        let playerHP = 100;
        let timeLeft = TIME_LIMIT;
        let currentTurnVelocity = 0, turnSpringVelocity = 0;
        let bases = [], turrets = [], particles = [], rings = [], items = [];
        const keys = {};
        let fireTimer = 0, isPointerDown = false, startPointerX = 0, currentRelativeX = 0;

        const clock = new THREE.Clock();
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 惑星 ---
        const planetGroup = new THREE.Group();
        const sphereGeo = new THREE.SphereGeometry(PLANET_RADIUS, 24, 16);
        const planetSolid = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({ color: 0x000500 }));
        planetGroup.add(planetSolid);
        const planetWire = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true }));
        planetGroup.add(planetWire);
        scene.add(planetGroup);

        // --- 自機 ---
        const shipGroup = new THREE.Group();
        const shipMesh = new THREE.Mesh(
            new THREE.ConeGeometry(1.5, SHIP_SIZE, 4).rotateX(Math.PI / 2),
            new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true })
        );
        shipGroup.add(shipMesh);
        scene.add(shipGroup);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 0); camera.up.set(0, 0, 1); camera.lookAt(0, 0, 10);
        shipGroup.add(camera);

        // --- 弾丸プール ---
        const bulletGeo = new THREE.CylinderGeometry(0.3, 0.3, 2, 4).rotateX(Math.PI / 2);
        const playerBulletPool = [];
        for (let i = 0; i < MAX_POOL_BULLETS; i++) {
            const b = new THREE.Mesh(bulletGeo, new THREE.MeshBasicMaterial({ color: 0xffaa00, wireframe: true }));
            b.visible = false; b.userData = { active: false, distance: 0 };
            scene.add(b); playerBulletPool.push(b);
        }

        const enemyBulletPool = [];
        for (let i = 0; i < MAX_ENEMY_BULLETS; i++) {
            const b = new THREE.Mesh(bulletGeo, new THREE.MeshBasicMaterial({ color: 0x8800ff, wireframe: true })); // 紫色
            b.visible = false; b.userData = { active: false, distance: 0 };
            scene.add(b); enemyBulletPool.push(b);
        }

        window.changeState = function (newState) {
            currentState = newState;
            document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
            document.getElementById('ui').style.display = 'none';
            if (newState === GameState.TITLE) {
                document.getElementById('screen-title').classList.remove('hidden');
                resetGameData();
            } else if (newState === GameState.PREP) {
                document.getElementById('screen-prep').classList.remove('hidden');
                setTimeout(() => document.getElementById('btn-go').classList.remove('hidden'), 1000);
            } else if (newState === GameState.GAME) {
                document.getElementById('ui').style.display = 'block';
                clock.start();
            } else if (newState === GameState.GAMEOVER) {
                document.getElementById('screen-gameover').classList.remove('hidden');
            }
        };

        function resetGameData() {
            playerHP = 100; timeLeft = TIME_LIMIT; maxSimultaneousBullets = 4;
            [...bases, ...turrets, ...items].forEach(obj => scene.remove(obj));
            bases = []; turrets = []; items = [];
            createBases();
            createTurrets(); // 固定砲台の生成
            createItems();
            shipGroup.quaternion.set(0, 0, 0, 1);
            shipGroup.position.set(0, PLANET_RADIUS + ALTITUDE, 0);
        }

        function createBases() {
            const baseGeo = new THREE.CylinderGeometry(BASE_RADIUS, BASE_RADIUS, BASE_HEIGHT, 6);
            for (let i = 0; i < 4; i++) {
                const isPlayer = (i === 0);
                const base = new THREE.Mesh(baseGeo, new THREE.MeshBasicMaterial({ color: isPlayer ? 0x00ffff : 0xff0000, wireframe: true }));
                let pos = getRandomPlanetPos();
                base.position.copy(pos);
                const normal = pos.clone().normalize();
                base.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
                base.position.add(normal.multiplyScalar(BASE_HEIGHT * 0.4));
                base.userData = { hp: 8, active: true, dying: false, isPlayer, normal: normal.clone(), origin: base.position.clone(), sink: 0 };
                scene.add(base); bases.push(base);
            }
        }

        function createTurrets() {
            const turretGeo = new THREE.BoxGeometry(TURRET_RADIUS * 1.5, BASE_HEIGHT, TURRET_RADIUS * 1.5);
            for (let i = 0; i < 2; i++) {
                const turret = new THREE.Mesh(turretGeo, new THREE.MeshBasicMaterial({ color: 0x8800ff, wireframe: true })); // 紫色
                let pos = getRandomPlanetPos();
                turret.position.copy(pos);
                const normal = pos.clone().normalize();
                turret.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
                turret.position.add(normal.multiplyScalar(BASE_HEIGHT * 0.4));
                turret.userData = { hp: 8, active: true, dying: false, normal: normal.clone(), origin: turret.position.clone(), sink: 0, fireTimer: 0 };
                scene.add(turret); turrets.push(turret);
            }
        }

        function getRandomPlanetPos() {
            let pos;
            do {
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = 2 * Math.PI * Math.random();
                pos = new THREE.Vector3().setFromSphericalCoords(PLANET_RADIUS, phi, theta);
            } while (pos.distanceTo(new THREE.Vector3(0, PLANET_RADIUS, 0)) < 50);
            return pos;
        }

        function createItems() {
            const itemGeo = new THREE.IcosahedronGeometry(1.5, 0);
            for (let i = 0; i < 4; i++) {
                const item = new THREE.Mesh(itemGeo, new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true }));
                item.position.copy(getRandomPlanetPos().normalize().multiplyScalar(PLANET_RADIUS + ALTITUDE));
                item.userData = { active: true }; scene.add(item); items.push(item);
            }
        }

        function spawnParticles(pos, color, count) {
            const partGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            for (let i = 0; i < count; i++) {
                const p = new THREE.Mesh(partGeo, new THREE.MeshBasicMaterial({ color: color, wireframe: true }));
                p.position.copy(pos);
                particles.push({ mesh: p, vel: new THREE.Vector3((Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5)), life: 20 });
                scene.add(p);
            }
        }

        // 入力
        window.addEventListener('keydown', e => { keys[e.code] = true; });
        window.addEventListener('keyup', e => { keys[e.code] = false; });
        function onPointerDown(x) { isPointerDown = true; startPointerX = x; currentRelativeX = 0; }
        window.addEventListener('mousedown', e => { if (e.button === 0) onPointerDown(e.clientX); });
        window.addEventListener('mousemove', e => { if (isPointerDown) currentRelativeX = e.clientX - startPointerX; });
        window.addEventListener('mouseup', () => { isPointerDown = false; currentRelativeX = 0; });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            planetGroup.rotateY(0.0005);

            if (currentState === GameState.GAME) {
                timeLeft -= delta;

                // 自機の移動
                let targetTurn = 0;
                if (keys['ArrowLeft'] || keys['KeyA']) targetTurn += MAX_TURN_SPEED;
                if (keys['ArrowRight'] || keys['KeyD']) targetTurn -= MAX_TURN_SPEED;
                if (isPointerDown) targetTurn = THREE.MathUtils.clamp(-currentRelativeX * 0.0005, -MAX_TURN_SPEED, MAX_TURN_SPEED);
                turnSpringVelocity += (targetTurn - currentTurnVelocity) * TURN_SPRING;
                turnSpringVelocity *= TURN_DAMPING;
                currentTurnVelocity += turnSpringVelocity;
                shipGroup.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), currentTurnVelocity));
                shipGroup.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), FORWARD_SPEED));
                shipGroup.position.copy(new THREE.Vector3(0, PLANET_RADIUS + ALTITUDE, 0)).applyQuaternion(shipGroup.quaternion);
                shipMesh.rotation.z = -currentTurnVelocity * 12;

                // 自機の射撃
                if (fireTimer > 0) fireTimer--;
                if ((isPointerDown || keys['Space']) && fireTimer <= 0) {
                    const b = playerBulletPool.find(b => !b.userData.active);
                    if (b) { b.visible = true; b.userData.active = true; b.userData.distance = 0; b.quaternion.copy(shipGroup.quaternion); fireTimer = 14; }
                }

                // 砲台の処理
                turrets.forEach(t => {
                    if (!t.userData.active || t.userData.dying) return;
                    // 高速回転
                    t.rotateOnAxis(new THREE.Vector3(0, 1, 0), 0.1);

                    t.userData.fireTimer++;
                    if (t.userData.fireTimer > 50) { // 射撃間隔
                        // 4方向へ同時に発射
                        for (let i = 0; i < 4; i++) {
                            const eb = enemyBulletPool.find(b => !b.userData.active);
                            if (eb) {
                                eb.visible = true; eb.userData.active = true; eb.userData.distance = 0;
                                eb.quaternion.copy(t.quaternion);
                                // 90度ずつずらして4方向にする
                                eb.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), (Math.PI / 2) * i));
                            }
                        }
                        t.userData.fireTimer = 0;
                    }
                });

                // 自弾の更新と判定
                playerBulletPool.forEach(b => {
                    if (!b.userData.active) return;
                    b.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), BULLET_SPEED));
                    b.position.copy(new THREE.Vector3(0, PLANET_RADIUS + ALTITUDE, 0)).applyQuaternion(b.quaternion);
                    // 基地への判定
                    bases.forEach(base => {
                        if (base.userData.active && !base.userData.dying && !base.userData.isPlayer && b.position.distanceTo(base.position) < BASE_RADIUS + 2) {
                            b.userData.active = false; b.visible = false; base.userData.hp--;
                            if (base.userData.hp <= 0) base.userData.dying = true;
                        }
                    });
                    // 砲台への判定
                    turrets.forEach(t => {
                        if (t.userData.active && !t.userData.dying && b.position.distanceTo(t.position) < TURRET_RADIUS + 2) {
                            b.userData.active = false; b.visible = false; t.userData.hp--;
                            if (t.userData.hp <= 0) t.userData.dying = true;
                        }
                    });
                    if ((b.userData.distance += BULLET_SPEED) > Math.PI) { b.userData.active = false; b.visible = false; }
                });

                // 敵弾の更新と判定
                enemyBulletPool.forEach(eb => {
                    if (!eb.userData.active) return;
                    eb.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), BULLET_SPEED * 0.5)); // 1/2の速度
                    eb.position.copy(new THREE.Vector3(0, PLANET_RADIUS + ALTITUDE, 0)).applyQuaternion(eb.quaternion);
                    // 自機へのダメージ判定
                    if (eb.position.distanceTo(shipGroup.position) < 3.0) {
                        eb.userData.active = false; eb.visible = false; playerHP -= 10;
                        spawnParticles(eb.position, 0x8800ff, 5);
                    }
                    if ((eb.userData.distance += (BULLET_SPEED * 0.5)) > Math.PI) { eb.userData.active = false; eb.visible = false; }
                });

                // 破壊演出
                [...bases, ...turrets].forEach(obj => {
                    if (obj.userData.dying) {
                        obj.userData.sink += 0.05;
                        obj.position.copy(obj.userData.origin).sub(obj.userData.normal.clone().multiplyScalar(obj.userData.sink));
                        if (obj.userData.sink > BASE_HEIGHT) obj.userData.active = false;
                    }
                });

                // アイテム
                items.forEach(item => {
                    if (item.userData.active && shipGroup.position.distanceTo(item.position) < 3.5) {
                        item.userData.active = false; item.visible = false;
                        maxSimultaneousBullets = Math.min(8, maxSimultaneousBullets + 1);
                    }
                });

                updateUI();
            }

            // パーティクル・リング更新
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].mesh.position.add(particles[i].vel);
                if (--particles[i].life <= 0) { scene.remove(particles[i].mesh); particles.splice(i, 1); }
            }
            renderer.render(scene, camera);
        }

        function updateUI() {
            const targets = [...bases.filter(b => !b.userData.isPlayer), ...turrets].filter(t => t.userData.active).length;
            const sec = Math.max(0, Math.floor(timeLeft % 60)).toString().padStart(2, '0');
            document.getElementById('ui').innerHTML = `TARGETS: ${targets} | HP: ${Math.max(0, playerHP)}% | TIME: ${Math.floor(timeLeft / 60)}:${sec}`;
            if (targets === 0) { changeState(GameState.GAMEOVER); document.getElementById('gameover-title').innerText = "MISSION CLEAR"; }
            if (timeLeft <= 0 || playerHP <= 0) { changeState(GameState.GAMEOVER); }
        }

        resetGameData();
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>

</html>
